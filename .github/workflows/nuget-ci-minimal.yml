on:
  workflow_call:
    inputs:
      release_type:
        description: 'rc, stable o vacio'
        required: false
        type: string
        default: ''
      package:
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "build release_type=${{ inputs.release_type }}"

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: inputs.release_type != ''
    steps:
      - run: echo "publish release_type=${{ inputs.release_type }}"
