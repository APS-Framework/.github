on:
  workflow_call:
    inputs:
      release_type:
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "build"

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: inputs.release_type != ''
    steps:
      - run: echo "publish"
