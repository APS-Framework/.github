name: Sync Vector Store Docs

# Workflow reutilizable. Invocar desde cada repositorio con:
#
#   jobs:
#     sync-docs:
#       uses: CS-Level/.github/.github/workflows/sync-vector-docs.yml@main
#       with:
#         file_filter: 'src/MyLib/ops-docs/**/*.md'
#         docs_prefix: 'RSB'
#       secrets: inherit
#
# Variables de repositorio requeridas en el caller (vars.*):
#   FOUNDRY_ENDPOINT_SBX   - URL base del endpoint Azure AI Foundry
#   VS_TRAINER_ID_SBX      - ID del vector store de destino
#   OPS_DOCS_FILE_FILTER   - Glob repo-relativo por defecto (usado en push automático)
#
# Secrets requeridos en el caller (secrets.*):
#   FOUNDRY_API_KEY_SBX    - API key del endpoint Azure AI Foundry

on:
  workflow_call:
    inputs:
      file_filter:
        description: 'Glob pattern relative to the repo root (required). E.g. src/MyLib/ops-docs/TKT/* or src/MyLib/ops-docs/RES/AgregarSegmento.md.'
        required: true
        type: string
      docs_prefix:
        description: 'Prefix for vector store file naming (e.g. RSB). Identifies this repo in the shared vector store.'
        required: false
        type: string
        default: 'RSB'
      force_all:
        description: 'Force full resync: reupload all docs regardless of current sync state.'
        required: false
        type: boolean
        default: false
      migrate_unscoped_legacy:
        description: 'Also migrate old unscoped names (opsdocs::<rel>... and plain rel) into the canonical prefixed format.'
        required: false
        type: boolean
        default: false
      confirm_large_sync:
        description: 'Required when the filter matches more than 200 files. Set to true to confirm the large sync intentionally.'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  FOUNDRY_API_VERSION: 2025-05-15-preview

jobs:
  sync-docs:
    name: Sync docs to vector store
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Sync docs (create, update, delete)
        env:
          FOUNDRY_ENDPOINT: ${{ vars.FOUNDRY_ENDPOINT_SBX }}
          FOUNDRY_API_KEY: ${{ secrets.FOUNDRY_API_KEY_SBX }}
          VS_ID: ${{ vars.VS_TRAINER_ID_SBX }}
          DOCS_PREFIX: ${{ inputs.docs_prefix }}
          FILE_FILTER: ${{ inputs.file_filter }}
          FORCE_ALL: ${{ inputs.force_all && 'true' || 'false' }}
          MIGRATE_UNSCOPED_LEGACY: ${{ inputs.migrate_unscoped_legacy && 'true' || 'false' }}
          CONFIRM_LARGE_SYNC: ${{ inputs.confirm_large_sync && 'true' || 'false' }}
        run: |
          python3 << 'PYEOF'
          import hashlib
          import os
          import re
          import sys
          import time
          import urllib.parse
          from pathlib import Path

          import requests

          endpoint = os.environ["FOUNDRY_ENDPOINT"].rstrip("/")
          api_key = os.environ["FOUNDRY_API_KEY"]
          vs_id = os.environ["VS_ID"]
          api_ver = os.environ["FOUNDRY_API_VERSION"]
          force_all = os.environ.get("FORCE_ALL", "false").lower() == "true"
          docs_prefix = (os.environ.get("DOCS_PREFIX") or "RSB").strip().strip("/")
          migrate_unscoped_legacy = os.environ.get("MIGRATE_UNSCOPED_LEGACY", "false").lower() == "true"
          file_filter = (os.environ.get("FILE_FILTER") or "").strip()
          confirm_large_sync = os.environ.get("CONFIRM_LARGE_SYNC", "false").lower() == "true"
          repo_slug = (os.environ.get("GITHUB_REPOSITORY") or "unknown/repo").strip()
          repo_scope = repo_slug.replace("/", "__")
          started_at = time.time()

          if not docs_prefix:
              print("ERROR: DOCS_PREFIX cannot be empty")
              sys.exit(1)

          if not file_filter:
              print("ERROR: FILE_FILTER is required. Set it via the workflow input or the OPS_DOCS_FILE_FILTER repo variable.")
              sys.exit(1)

          headers = {"api-key": api_key}
          prefixed_stable_pattern = re.compile(rf"^opsdocs::{re.escape(docs_prefix)}/(.+\.md)$")
          prefixed_hashed_pattern = re.compile(rf"^opsdocs::{re.escape(docs_prefix)}/(.+)::sha256=([a-f0-9]{{64}})\.md$")
          scoped_stable_pattern = re.compile(rf"^opsdocs::{re.escape(repo_scope)}::(.+)\.md$")
          scoped_hashed_pattern = re.compile(rf"^opsdocs::{re.escape(repo_scope)}::(.+)::sha256=([a-f0-9]{{64}})\.md$")
          legacy_stable_pattern = re.compile(r"^opsdocs::(.+)\.md$")
          legacy_hashed_pattern = re.compile(r"^opsdocs::(.+)::sha256=([a-f0-9]{64})\.md$")

          def log(message):
              print(message, flush=True)

          def api_get(path, params=None):
              r = requests.get(f"{endpoint}{path}", headers=headers, params=params, timeout=120)
              r.raise_for_status()
              return r.json()

          def api_delete(path, params=None):
              r = requests.delete(f"{endpoint}{path}", headers=headers, params=params, timeout=120)
              if r.status_code not in (200, 202, 204, 404):
                  r.raise_for_status()
              return r

          def api_post_json(path, payload, params=None):
              r = requests.post(
                  f"{endpoint}{path}",
                  headers={**headers, "Content-Type": "application/json"},
                  params=params,
                  json=payload,
                  timeout=120,
              )
              r.raise_for_status()
              return r.json()

          def upload_file(file_path: Path, upload_name: str):
              with file_path.open("rb") as fh:
                  r = requests.post(
                      f"{endpoint}/files",
                      headers=headers,
                      params={"api-version": api_ver},
                      files={"file": (upload_name, fh, "text/markdown")},
                      data={"purpose": "assistants"},
                      timeout=180,
                  )
              r.raise_for_status()
              return r.json()["id"]

          def list_vs_files():
              items = []
              after = None
              while True:
                  params = {"api-version": api_ver, "limit": 100}
                  if after:
                      params["after"] = after
                  page = api_get(f"/vector_stores/{vs_id}/files", params=params)
                  data = page.get("data", [])
                  items.extend(data)
                  if not page.get("has_more"):
                      break
                  after = page.get("last_id")
                  if not after:
                      break
              return items

          def get_file_meta(file_id: str):
              return api_get(f"/files/{file_id}", params={"api-version": api_ver})

          def attach_file(file_id: str):
              return api_post_json(
                  f"/vector_stores/{vs_id}/files",
                  {"file_id": file_id},
                  params={"api-version": api_ver},
              )

          def detach_file(file_id: str):
              return api_delete(f"/vector_stores/{vs_id}/files/{file_id}", params={"api-version": api_ver})

          # file_filter is a repo-relative glob (required).
          resolved_filter = file_filter

          repo_docs = {}
          for path in sorted(Path(".").glob(resolved_filter)):
              if not path.is_file() or path.suffix != ".md":
                  continue
              rel = path.as_posix()
              sha = hashlib.sha256(path.read_bytes()).hexdigest()
              # Canonical, human-readable namespace, e.g. opsdocs::RSB/src/MyLib/ops-docs/TKT/NdcDisplayTkt.md
              upload_name = f"opsdocs::{docs_prefix}/{rel}"
              repo_docs[rel] = {"path": path, "sha": sha, "upload_name": upload_name}

          if len(repo_docs) > 200 and not confirm_large_sync:
              print(
                  f"ERROR: FILE_FILTER '{resolved_filter}' matched {len(repo_docs)} files (> 200). "
                  "Re-run with confirm_large_sync=true to proceed intentionally."
              )
              sys.exit(1)

          log(f"Repository docs discovered: {len(repo_docs)}")
          log(f"Repository scope: {repo_slug}")
          log(f"Docs prefix: {docs_prefix}")
          log(f"File filter: {resolved_filter}")
          log(f"Force full sync: {force_all}")
          log(f"Migrate unscoped legacy: {migrate_unscoped_legacy}")

          errors = []
          stats = {"created": 0, "updated": 0, "deleted": 0, "unchanged": 0}

          existing_by_rel = {}
          unmanaged_entries = []
          content_sha_cache = {}

          def parse_rel_and_sha(filename: str):
              # Current canonical prefixed format.
              match = prefixed_hashed_pattern.match(filename)
              if match:
                  rel = urllib.parse.unquote(match.group(1))
                  sha = match.group(2)
                  return rel, sha

              match = prefixed_stable_pattern.match(filename)
              if match:
                  rel = urllib.parse.unquote(match.group(1))
                  return rel, None

              # Previous repository-scoped format from earlier migration.
              match = scoped_hashed_pattern.match(filename)
              if match:
                  rel = urllib.parse.unquote(match.group(1))
                  sha = match.group(2)
                  return rel, sha

              match = scoped_stable_pattern.match(filename)
              if match:
                  rel = urllib.parse.unquote(match.group(1))
                  return rel, None

              # Optional one-time migration for old unscoped names.
              if migrate_unscoped_legacy:
                  match = legacy_hashed_pattern.match(filename)
                  if match:
                      rel = urllib.parse.unquote(match.group(1))
                      sha = match.group(2)
                      if rel in repo_docs:
                          return rel, sha
                      return None, None

                  match = legacy_stable_pattern.match(filename)
                  if match:
                      rel = urllib.parse.unquote(match.group(1))
                      if rel in repo_docs:
                          return rel, None
                      return None, None

                  # Compatibility with previous plain filename uploads from this repo.
                  if filename in repo_docs:
                      return filename, None

              return None, None

          def try_get_file_sha(file_id: str):
              if file_id in content_sha_cache:
                  return content_sha_cache[file_id]

              try:
                  r = requests.get(
                      f"{endpoint}/files/{file_id}/content",
                      headers=headers,
                      params={"api-version": api_ver},
                      timeout=180,
                  )
                  if r.status_code == 404:
                      content_sha_cache[file_id] = None
                      return None
                  r.raise_for_status()
                  file_sha = hashlib.sha256(r.content).hexdigest()
                  content_sha_cache[file_id] = file_sha
                  return file_sha
              except requests.HTTPError as exc:
                  body = exc.response.text if exc.response is not None else str(exc)
                  errors.append(f"content hash {file_id}: {body}")
                  content_sha_cache[file_id] = None
                  return None

          try:
              vs_entries = list_vs_files()
          except requests.HTTPError as exc:
              body = exc.response.text if exc.response is not None else str(exc)
              print(f"ERROR listing vector store files: {body}")
              sys.exit(1)

          for entry in vs_entries:
              vector_file_id = entry.get("id")
              file_id = entry.get("file_id") or entry.get("id")
              if not file_id:
                  continue
              try:
                  meta = get_file_meta(file_id)
              except requests.HTTPError as exc:
                  body = exc.response.text if exc.response is not None else str(exc)
                  errors.append(f"metadata {file_id}: {body}")
                  continue

              filename = meta.get("filename", "")
              rel, sha = parse_rel_and_sha(filename)
              mapped = {
                  "vector_file_id": vector_file_id or file_id,
                  "file_id": file_id,
                  "filename": filename,
                  "sha": sha,
              }

              if rel is None:
                  unmanaged_entries.append(mapped)
                  continue

              existing_by_rel.setdefault(rel, []).append(mapped)

          if unmanaged_entries:
              log(f"Unmanaged files detected (kept as-is): {len(unmanaged_entries)}")

          # Delete removed files to converge to repo state.
          for rel, entries in existing_by_rel.items():
              if rel not in repo_docs:
                  for entry in entries:
                      try:
                          detach_file(entry["vector_file_id"])
                          stats["deleted"] += 1
                          log(f"Deleted removed doc: {rel}")
                      except requests.HTTPError as exc:
                          body = exc.response.text if exc.response is not None else str(exc)
                          errors.append(f"delete removed {rel}: {body}")

          total_docs = len(repo_docs)
          for idx, (rel, doc) in enumerate(repo_docs.items(), start=1):
              log(f"[{idx}/{total_docs}] Processing: {rel}")
              entries = existing_by_rel.get(rel, [])

              if force_all:
                  removed = 0
                  for entry in entries:
                      try:
                          detach_file(entry["vector_file_id"])
                          stats["deleted"] += 1
                          removed += 1
                      except requests.HTTPError as exc:
                          body = exc.response.text if exc.response is not None else str(exc)
                          errors.append(f"force delete {rel}: {body}")
                  if removed:
                      log(f"  force_all=true: removed {removed} existing attachment(s)")
              else:
                  keep_one_current = False
                  stale_entries = []
                  for entry in entries:
                      entry_sha = entry.get("sha")
                      if not entry_sha:
                          entry_sha = try_get_file_sha(entry["file_id"])

                      is_current = entry_sha == doc["sha"]
                      is_canonical_name = entry.get("filename") == doc["upload_name"]

                      # Keep only a current entry that already uses the canonical name.
                      if is_current and is_canonical_name and not keep_one_current:
                          keep_one_current = True
                          continue

                      stale_entries.append(entry)

                  if keep_one_current:
                      for entry in stale_entries:
                          try:
                              detach_file(entry["vector_file_id"])
                              stats["deleted"] += 1
                              log(f"  deleted stale/duplicate: {entry.get('filename')}")
                          except requests.HTTPError as exc:
                              body = exc.response.text if exc.response is not None else str(exc)
                              errors.append(f"delete stale {rel}: {body}")

                      stats["unchanged"] += 1
                      log("  unchanged: already synchronized")
                      continue

              try:
                  new_file_id = upload_file(doc["path"], doc["upload_name"])
                  attach_file(new_file_id)
                  if entries:
                      stats["updated"] += 1
                      log(f"  updated (file_id={new_file_id})")
                  else:
                      stats["created"] += 1
                      log(f"  created (file_id={new_file_id})")

                  # Remove old versions only after new one is attached.
                  if not force_all and entries:
                      for entry in entries:
                          try:
                              detach_file(entry["vector_file_id"])
                              stats["deleted"] += 1
                              log(f"  removed previous version: {entry.get('filename')}")
                          except requests.HTTPError as exc:
                              body = exc.response.text if exc.response is not None else str(exc)
                              errors.append(f"cleanup old version {rel}: {body}")
              except requests.HTTPError as exc:
                  body = exc.response.text if exc.response is not None else str(exc)
                  errors.append(f"upsert {rel}: {body}")
                  log("  error during upload/attach (see final errors)")

          elapsed = int(time.time() - started_at)
          log(
              f"Summary => created={stats['created']} updated={stats['updated']} "
              f"deleted={stats['deleted']} unchanged={stats['unchanged']} elapsed={elapsed}s"
          )

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as s:
                  s.write("## Ops-docs sync summary\n\n")
                  s.write(f"- Docs prefix: `{docs_prefix}`\n")
                  s.write(f"- File filter: `{resolved_filter}`\n")
                  s.write(f"- Force full sync: `{force_all}`\n")
                  s.write(f"- Migrate unscoped legacy: `{migrate_unscoped_legacy}`\n")
                  s.write(f"- Repository docs: `{len(repo_docs)}`\n")
                  s.write(f"- Created: `{stats['created']}`\n")
                  s.write(f"- Updated: `{stats['updated']}`\n")
                  s.write(f"- Deleted: `{stats['deleted']}`\n")
                  s.write(f"- Unchanged: `{stats['unchanged']}`\n")
                  s.write(f"- Duration: `{elapsed}s`\n")
                  s.write(f"- Errors: `{len(errors)}`\n")

          if errors:
              log("Sync finished with errors:")
              for e in errors:
                  log(f"  - {e}")
              sys.exit(1)

          log(f"Sync finished successfully in {elapsed}s")
          PYEOF
