name: NuGet CI & Publish

# Workflow reutilizable. Invocar desde cada repositorio SDK con:
#
#   jobs:
#     ci-publish:
#       uses: APS-Framework/.github/.github/workflows/nuget-ci-publish.yml@main
#       with:
#         release_type: ${{ inputs.release_type || '' }}
#         packages: ${{ inputs.packages || '' }}   # uno o varios paquetes separados por comas
#       secrets: inherit

on:
  workflow_call:
    inputs:
      release_type:
        description: '"rc", "stable" o "" (solo build+test)'
        required: false
        type: string
        default: ''
      packages:
        description: 'One or more PackageIds separated by commas (e.g. APS.Foo or APS.Foo,APS.Bar). Empty = single package repo.'
        required: false
        type: string
        default: ''
    secrets:
      APS_NUGET_TOKEN:
        description: >-
          PAT con scope write:packages (incluye read:packages). Se usa para:
          (1) publicar paquetes en GitHub Packages de APS-Framework;
          (2) autenticar el restore del feed APS-Framework, referenciado en el
          nuget.config como %APS_NUGET_TOKEN%.
          Para feeds de otras organizaciones GitHub, el nuget.config del repositorio
          llamante debe referenciar su propio token por fuente (p. ej.
          %OTHER_ORG_NUGET_TOKEN%) y ese secret debe estar disponible en el repositorio
          o la organización llamante vía secrets: inherit.
        required: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            10.x

      - name: Restore
        run: dotnet restore
        env:
          APS_NUGET_TOKEN: ${{ secrets.APS_NUGET_TOKEN }}

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release

  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest
    needs: build
    if: inputs.release_type != ''

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # necesario para consultar todos los tags

      - name: Checkout shared workflow scripts
        uses: actions/checkout@v4
        with:
          repository: APS-Framework/.github
          ref: main
          path: .APS-github

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            10.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Restore
        run: dotnet restore
        env:
          APS_NUGET_TOKEN: ${{ secrets.APS_NUGET_TOKEN }}

      - name: Publicar paquetes
        env:
          APS_NUGET_TOKEN: ${{ secrets.APS_NUGET_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .APS-github/.github/scripts/nuget_publish.py \
            --release-type "${{ inputs.release_type }}" \
            --packages "${{ inputs.packages }}"
