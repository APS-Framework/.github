name: NuGet CI & Publish

# Workflow reutilizable. Invocar desde cada repositorio SDK con:
#
#   jobs:
#     ci-publish:
#       uses: APS-Framework/.github/.github/workflows/nuget-ci-publish.yml@main
#       with:
#         release_type: ${{ inputs.release_type || '' }}
#         packages: ${{ inputs.packages || '' }}   # uno o varios paquetes separados por comas
#       secrets: inherit

on:
  workflow_call:
    inputs:
      release_type:
        description: '"rc", "stable" o "" (solo build+test)'
        required: false
        type: string
        default: ''
      packages:
        description: 'One or more PackageIds separated by commas (e.g. APS.Foo or APS.Foo,APS.Bar). Empty = single package repo.'
        required: false
        type: string
        default: ''
    secrets:
      APS_NUGET_TOKEN:
        description: >-
          Classic PAT con scope read:packages. Otorga acceso de lectura a todos los feeds
          NuGet privados de las organizaciones corporativas. Cada fuente corporativa en el
          nuget.config referencia esta variable con %APS_NUGET_TOKEN%. Gestionado por el
          administrador de la empresa y compartido como org secret en APS-Framework.
        required: true
      NUGET_PUBLISH_TOKEN:
        description: >-
          PAT con scope write:packages de la organización publicadora. Se usa exclusivamente
          para dotnet nuget push. Para repos de APS-Framework puede ser el mismo token que
          APS_NUGET_TOKEN. Para repos de otras organizaciones debe ser un PAT con
          write:packages sobre su propia org.
        required: true
      NUGET_EXTERNAL_TOKEN:
        description: >-
          PAT opcional para feeds NuGet privados de proveedores externos a la compañía.
          Referenciar en el nuget.config como %NUGET_EXTERNAL_TOKEN%. Si el repositorio no
          consume feeds externos, este secret puede omitirse.
        required: false

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            10.x

      - name: Restore
        run: dotnet restore
        env:
          APS_NUGET_TOKEN: ${{ secrets.APS_NUGET_TOKEN }}
          NUGET_EXTERNAL_TOKEN: ${{ secrets.NUGET_EXTERNAL_TOKEN }}

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release

  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest
    needs: build
    if: inputs.release_type != ''

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # necesario para consultar todos los tags

      - name: Checkout shared workflow scripts
        uses: actions/checkout@v4
        with:
          repository: APS-Framework/.github
          ref: main
          path: .APS-github

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            10.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Restore
        run: dotnet restore
        env:
          APS_NUGET_TOKEN: ${{ secrets.APS_NUGET_TOKEN }}
          NUGET_EXTERNAL_TOKEN: ${{ secrets.NUGET_EXTERNAL_TOKEN }}

      - name: Publicar paquetes
        env:
          APS_NUGET_TOKEN: ${{ secrets.APS_NUGET_TOKEN }}
          NUGET_PUBLISH_TOKEN: ${{ secrets.NUGET_PUBLISH_TOKEN }}
          NUGET_EXTERNAL_TOKEN: ${{ secrets.NUGET_EXTERNAL_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .APS-github/.github/scripts/nuget_publish.py \
            --release-type "${{ inputs.release_type }}" \
            --packages "${{ inputs.packages }}" \
            --org "${{ github.repository_owner }}"
